name: Docker CI/CD
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: recuperer le code
        uses: actions/checkout@v3
      - name: connexion à dockerhub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: build et push de l'image
        run: |
          docker build -t claracrdocker/devops:latest .
          docker tag claracrdocker/devops:latest claracrdocker/devops:latest
          docker push claracrdocker/devops:latest
          docker push claracrdocker/devops:${{ github.sha }}
      - name: deploiement sur le serveur
        run: |
          ssh user@server "docker pull claracrdocker/devops:latest && docker run -d -p 3000:3000 claracrdocker/devops:latest"
